name: Terraform Plan

# ============================================================================
# GitHub Actions Workflow: Terraform Plan
# ============================================================================
# Generates Terraform plan for pull requests using tfvars files
# Runs after PR Validation and IaC Scan workflows
# ============================================================================

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'environments/**'
      - 'modules/**'
      - '*.tf'
      - '.github/workflows/terraform-plan.yml'

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: 1.6.0

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    name: Plan Infrastructure Changes
    strategy:
      matrix:
        environment: [dev, qa, prod]

    # Prevent concurrent runs
    concurrency:
      group: terraform-plan-${{ github.ref }}-${{ matrix.environment }}
      cancel-in-progress: false

    # Permissions for OIDC and PR comments
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      # =====================================================================
      # Step 1: Checkout Code
      # =====================================================================
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =====================================================================
      # Step 2: Configure AWS Credentials via OIDC
      # =====================================================================
      - name: 🔐 Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          role-session-name: terraform-plan-${{ github.run_id }}-${{ matrix.environment }}
          aws-region: ${{ env.AWS_REGION }}
        continue-on-error: true

      # =====================================================================
      # Step 3: Setup Terraform
      # =====================================================================
      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: true

      # =====================================================================
      # Step 4: Verify Environment TFVARS File
      # =====================================================================
      - name: 📋 Verify Environment File
        id: verify
        run: |
          TFVARS_FILE="environments/${{ matrix.environment }}.tfvars"
          
          if [ ! -f "$TFVARS_FILE" ]; then
            echo "❌ Environment file not found: $TFVARS_FILE"
            exit 1
          fi
          
          echo "✓ Found environment file: $TFVARS_FILE"
          echo "tfvars_file=${TFVARS_FILE}" >> $GITHUB_OUTPUT
          
          # Display environment config (for debugging)
          echo "Environment Configuration:"
          cat "$TFVARS_FILE"

      # =====================================================================
      # Step 5: Terraform Initialization
      # =====================================================================
      - name: 🚀 Terraform Init
        run: |
          echo "Initializing Terraform for ${{ matrix.environment }} environment..."
          terraform init -upgrade -backend=false
          echo "✓ Terraform initialization successful"

      # =====================================================================
      # Step 6: Terraform Validation
      # =====================================================================
      - name: ✔️ Terraform Validate
        run: |
          echo "Validating Terraform configuration..."
          terraform validate
          echo "✓ Terraform validation successful"

      # =====================================================================
      # Step 7: Terraform Plan for Environment
      # =====================================================================
      - name: 📋 Terraform Plan - ${{ matrix.environment }}
        id: plan
        run: |
          echo "Planning Terraform changes for ${{ matrix.environment }} environment..."
          
          terraform plan \
            -var-file="${{ steps.verify.outputs.tfvars_file }}" \
            -out=tfplan-${{ matrix.environment }} \
            -no-color \
            -lock=false \
            -input=false \
            -detailed-exitcode || EXIT_CODE=$?
          
          if [ "$EXIT_CODE" == "0" ]; then
            echo "Plan result: No changes required"
            echo "plan_status=no_changes" >> $GITHUB_OUTPUT
          elif [ "$EXIT_CODE" == "2" ]; then
            echo "Plan result: Changes required"
            echo "plan_status=has_changes" >> $GITHUB_OUTPUT
          else
            echo "Plan result: Failed or error"
            echo "plan_status=error" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "✓ Terraform plan completed for ${{ matrix.environment }}"

      # =====================================================================
      # Step 8: Generate Detailed Plan Output
      # =====================================================================
      - name: 📊 Generate Plan Summary
        id: plan_summary
        run: |
          echo "Generating plan summary for ${{ matrix.environment }}..."
          
          terraform show -no-color tfplan-${{ matrix.environment }} > plan-${{ matrix.environment }}.txt
          
          # Extract resource changes count
          ADDS=$(grep -c "^  # aws_" plan-${{ matrix.environment }}.txt 2>/dev/null || echo "0")
          CHANGES=$(grep -c "^  ~ " plan-${{ matrix.environment }}.txt 2>/dev/null || echo "0")
          DELETES=$(grep -c "^  - " plan-${{ matrix.environment }}.txt 2>/dev/null || echo "0")
          
          echo "plan_adds=${ADDS}" >> $GITHUB_OUTPUT
          echo "plan_changes=${CHANGES}" >> $GITHUB_OUTPUT
          echo "plan_deletes=${DELETES}" >> $GITHUB_OUTPUT
          
          echo "Plan Summary for ${{ matrix.environment }}:"
          head -50 plan-${{ matrix.environment }}.txt

      # =====================================================================
      # Step 9: Upload Plan Artifacts
      # =====================================================================
      - name: 📦 Upload Terraform Plan Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: terraform-plans
          path: |
            tfplan-${{ matrix.environment }}
            plan-${{ matrix.environment }}.txt
          retention-days: 7
          if-no-files-found: ignore

      # =====================================================================
      # Step 10: Comment on PR with Plan Summary
      # =====================================================================
      - name: 💬 Comment Plan on Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            
            let planContent = '';
            const planFile = 'plan-${{ matrix.environment }}.txt';
            
            try {
              if (fs.existsSync(planFile)) {
                const fullContent = fs.readFileSync(planFile, 'utf8');
                planContent = fullContent.length > 3000 
                  ? fullContent.substring(0, 3000) + '\n... (truncated for display)'
                  : fullContent;
              }
            } catch (e) {
              planContent = 'Unable to read plan file';
            }
            
            const comment = `
            ## 📋 Terraform Plan - \`${{ matrix.environment }}\` Environment
            
            **Status**: \`${{ steps.plan.outputs.plan_status }}\`
            
            **Changes Summary**:
            - ➕ Additions: ${{ steps.plan_summary.outputs.plan_adds || '0' }}
            - 🔄 Modifications: ${{ steps.plan_summary.outputs.plan_changes || '0' }}
            - ❌ Deletions: ${{ steps.plan_summary.outputs.plan_deletes || '0' }}
            
            **TFVARS File**: \`environments/${{ matrix.environment }}.tfvars\`
            
            <details>
            <summary>📊 Detailed Plan Output</summary>
            
            \`\`\`
            ${planContent}
            \`\`\`
            
            </details>
            
            **Environment Variables Used**:
            - AWS_REGION: ${{ env.AWS_REGION }}
            - TERRAFORM_VERSION: ${{ env.TERRAFORM_VERSION }}
            - Environment: ${{ matrix.environment }}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      # =====================================================================
      # Step 11: Workflow Summary
      # =====================================================================
      - name: 📝 Workflow Summary
        if: always()
        run: |
          echo "## 📋 Terraform Plan Results - ${{ matrix.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: \`${{ matrix.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**TFVARS File**: \`environments/${{ matrix.environment }}.tfvars\`" >> $GITHUB_STEP_SUMMARY
          echo "**Plan Status**: ${{ steps.plan.outputs.plan_status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Job Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Changes**:" >> $GITHUB_STEP_SUMMARY
          echo "- Additions: ${{ steps.plan_summary.outputs.plan_adds || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Modifications: ${{ steps.plan_summary.outputs.plan_changes || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deletions: ${{ steps.plan_summary.outputs.plan_deletes || '0' }}" >> $GITHUB_STEP_SUMMARY
