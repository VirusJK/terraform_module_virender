name: Terraform Build and Deploy

# ============================================================================
# GitHub Actions Workflow: Terraform Build and Deploy
# ============================================================================
# Complete build and deploy workflow with init, validate, plan, and apply
# Uses environment-specific tfvars files for configuration
# Manual workflow_dispatch trigger for controlled deployments
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod
      terraform_action:
        description: 'Action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm_destructive:
        description: 'Confirm destructive changes (deletions/destroy)'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: 1.6.0

jobs:
  terraform-build-deploy:
    runs-on: ubuntu-latest
    name: Terraform Build & Deploy - ${{ github.event.inputs.environment }}

    # Prevent concurrent deployments
    concurrency:
      group: terraform-deploy-${{ github.event.inputs.environment }}
      cancel-in-progress: false

    # Permissions for OIDC and deployments
    permissions:
      id-token: write
      contents: read
      deployments: write

    steps:
      # =====================================================================
      # Step 1: Checkout Code
      # =====================================================================
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =====================================================================
      # Step 2: Validate Input Parameters
      # =====================================================================
      - name: ✔️ Validate Input Parameters
        id: validate_input
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment }}"
          ACTION="${{ github.event.inputs.terraform_action }}"
          
          echo "📋 Deployment Parameters:"
          echo "  Environment: $ENVIRONMENT"
          echo "  Action: $ACTION"
          echo "  Confirm Destructive: ${{ github.event.inputs.confirm_destructive }}"
          
          # Validate environment
          if [[ ! "$ENVIRONMENT" =~ ^(dev|qa|prod)$ ]]; then
            echo "❌ Invalid environment: $ENVIRONMENT"
            exit 1
          fi
          
          # Validate action
          if [[ ! "$ACTION" =~ ^(plan|apply|destroy)$ ]]; then
            echo "❌ Invalid action: $ACTION"
            exit 1
          fi
          
          # For destroy action, require confirmation
          if [[ "$ACTION" == "destroy" && "${{ github.event.inputs.confirm_destructive }}" != "true" ]]; then
            echo "❌ Destroy action requires confirmation. Set 'confirm_destructive' to true"
            exit 1
          fi
          
          # For prod destroy, add extra warning
          if [[ "$ENVIRONMENT" == "prod" && "$ACTION" == "destroy" ]]; then
            echo "⚠️  WARNING: You are about to destroy PRODUCTION infrastructure!"
            echo "⚠️  This action is destructive and cannot be easily undone!"
          fi
          
          echo "✓ Input validation successful"
          echo "environment=${ENVIRONMENT}" >> $GITHUB_OUTPUT
          echo "action=${ACTION}" >> $GITHUB_OUTPUT

      # =====================================================================
      # Step 3: Configure AWS Credentials via OIDC
      # =====================================================================
      - name: 🔐 Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          role-session-name: terraform-deploy-${{ github.run_id }}-${{ steps.validate_input.outputs.environment }}
          aws-region: ${{ env.AWS_REGION }}

      # Alternative: Using static credentials (less secure - use only for testing)
      # - name: Configure AWS Credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ${{ env.AWS_REGION }}

      # =====================================================================
      # Step 4: Setup Terraform
      # =====================================================================
      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: true

      # =====================================================================
      # Step 5: Verify TFVARS File
      # =====================================================================
      - name: 📋 Verify TFVARS File
        id: verify_tfvars
        run: |
          TFVARS_FILE="environments/${{ steps.validate_input.outputs.environment }}.tfvars"
          
          if [ ! -f "$TFVARS_FILE" ]; then
            echo "❌ TFVARS file not found: $TFVARS_FILE"
            exit 1
          fi
          
          echo "✓ Found TFVARS file: $TFVARS_FILE"
          echo "tfvars_file=${TFVARS_FILE}" >> $GITHUB_OUTPUT
          
          echo "📝 Environment Configuration from $TFVARS_FILE:"
          cat "$TFVARS_FILE"

      # =====================================================================
      # Step 6: Terraform Initialization
      # =====================================================================
      - name: 🚀 Terraform Init
        id: init
        run: |
          echo "Initializing Terraform..."
          terraform init -upgrade
          
          if [ $? -eq 0 ]; then
            echo "✓ Terraform initialization successful"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Terraform initialization failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      # =====================================================================
      # Step 7: Terraform Format Check
      # =====================================================================
      - name: ✅ Terraform Format Check
        id: fmt
        run: |
          echo "Checking Terraform code formatting..."
          
          if terraform fmt -check -recursive .; then
            echo "✓ All Terraform files are properly formatted"
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Terraform format check detected formatting issues"
            echo "Run 'terraform fmt -recursive .' to fix"
            echo "status=warning" >> $GITHUB_OUTPUT
          fi

      # =====================================================================
      # Step 8: Terraform Validation
      # =====================================================================
      - name: ✔️ Terraform Validate
        id: validate
        run: |
          echo "Validating Terraform configuration..."
          
          if terraform validate; then
            echo "✓ Terraform validation successful"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Terraform validation failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      # =====================================================================
      # Step 9: Terraform Plan
      # =====================================================================
      - name: 📋 Terraform Plan
        id: plan
        run: |
          echo "Planning Terraform changes for ${{ steps.validate_input.outputs.environment }} environment..."
          
          terraform plan \
            -var-file="${{ steps.verify_tfvars.outputs.tfvars_file }}" \
            -out=tfplan \
            -no-color \
            -input=false \
            -detailed-exitcode || EXIT_CODE=$?
          
          if [ "$EXIT_CODE" == "0" ]; then
            echo "Plan result: No changes required"
            echo "plan_status=no_changes" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          elif [ "$EXIT_CODE" == "2" ]; then
            echo "Plan result: Changes required"
            echo "plan_status=has_changes" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "Plan result: Error"
            echo "plan_status=error" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "✓ Terraform plan completed"

      # =====================================================================
      # Step 10: Generate Plan Summary
      # =====================================================================
      - name: 📊 Generate Plan Summary
        id: plan_summary
        run: |
          echo "Generating plan summary..."
          
          terraform show -no-color tfplan > plan-output.txt
          
          # Count resource changes
          ADDS=$(grep -c "^  # aws_" plan-output.txt 2>/dev/null || echo "0")
          CHANGES=$(grep -c "^  ~ " plan-output.txt 2>/dev/null || echo "0")
          DELETES=$(grep -c "^  - " plan-output.txt 2>/dev/null || echo "0")
          
          echo "plan_adds=${ADDS}" >> $GITHUB_OUTPUT
          echo "plan_changes=${CHANGES}" >> $GITHUB_OUTPUT
          echo "plan_deletes=${DELETES}" >> $GITHUB_OUTPUT
          
          echo "📋 Plan Summary:"
          echo "  Resources to add: $ADDS"
          echo "  Resources to modify: $CHANGES"
          echo "  Resources to delete: $DELETES"

      # =====================================================================
      # Step 11: Upload Plan Artifact
      # =====================================================================
      - name: 📦 Upload Terraform Plan
        uses: actions/upload-artifact@v3
        with:
          name: terraform-plan-${{ steps.validate_input.outputs.environment }}-${{ github.run_id }}
          path: |
            tfplan
            plan-output.txt
          retention-days: 30
          if-no-files-found: ignore

      # =====================================================================
      # Step 12: Terraform Apply (if requested)
      # =====================================================================
      - name: 🚀 Terraform Apply
        id: apply
        if: github.event.inputs.terraform_action == 'apply' && steps.plan.outputs.has_changes == 'true'
        run: |
          echo "Applying Terraform changes to ${{ steps.validate_input.outputs.environment }} environment..."
          
          terraform apply \
            -no-color \
            -auto-approve \
            -input=false \
            tfplan
          
          if [ $? -eq 0 ]; then
            echo "✓ Terraform apply successful"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Terraform apply failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      # =====================================================================
      # Step 13: Terraform Destroy (if requested)
      # =====================================================================
      - name: 🗑️ Terraform Destroy
        id: destroy
        if: github.event.inputs.terraform_action == 'destroy'
        run: |
          echo "⚠️  DESTROYING infrastructure in ${{ steps.validate_input.outputs.environment }} environment..."
          
          terraform destroy \
            -var-file="${{ steps.verify_tfvars.outputs.tfvars_file }}" \
            -no-color \
            -auto-approve \
            -input=false
          
          if [ $? -eq 0 ]; then
            echo "✓ Terraform destroy completed"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Terraform destroy failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      # =====================================================================
      # Step 14: Get Outputs
      # =====================================================================
      - name: 📤 Get Terraform Outputs
        id: outputs
        if: github.event.inputs.terraform_action != 'destroy'
        run: |
          echo "Retrieving Terraform outputs..."
          
          # Save outputs to file
          terraform output -json > outputs.json
          
          # Display key outputs
          echo "📋 Infrastructure Outputs:"
          terraform output
          
          echo "outputs_saved=true" >> $GITHUB_OUTPUT

      # =====================================================================
      # Step 15: Upload Outputs Artifact
      # =====================================================================
      - name: 📦 Upload Terraform Outputs
        if: steps.outputs.outputs_saved == 'true'
        uses: actions/upload-artifact@v3
        with:
          name: terraform-outputs-${{ steps.validate_input.outputs.environment }}-${{ github.run_id }}
          path: outputs.json
          retention-days: 30
          if-no-files-found: ignore

      # =====================================================================
      # Step 16: Create Deployment
      # =====================================================================
      - name: 🚀 Create Deployment Record
        if: github.event.inputs.terraform_action == 'apply' && steps.apply.outputs.status == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: '${{ steps.validate_input.outputs.environment }}',
              required_contexts: [],
              auto_merge: false
            });
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: 'https://console.aws.amazon.com/',
              description: 'Terraform infrastructure deployed successfully'
            });

      # =====================================================================
      # Step 17: Workflow Summary
      # =====================================================================
      - name: 📝 Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Terraform Build & Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: \`${{ steps.validate_input.outputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Action: \`${{ steps.validate_input.outputs.action }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- TFVARS File: \`${{ steps.verify_tfvars.outputs.tfvars_file }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- AWS Region: \`${{ env.AWS_REGION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Terraform Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "- Init: ${{ steps.init.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Validate: ${{ steps.validate.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Plan: ${{ steps.plan.outputs.plan_status }}" >> $GITHUB_STEP_SUMMARY
          echo "  - Additions: ${{ steps.plan_summary.outputs.plan_adds || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "  - Modifications: ${{ steps.plan_summary.outputs.plan_changes || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "  - Deletions: ${{ steps.plan_summary.outputs.plan_deletes || '0' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.terraform_action }}" == "apply" ]; then
            echo "- Apply: ${{ steps.apply.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.terraform_action }}" == "destroy" ]; then
            echo "- Destroy: ${{ steps.destroy.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      # =====================================================================
      # Step 18: Slack Notification (Optional)
      # =====================================================================
      # Uncomment to enable Slack notifications
      # - name: 📢 Send Slack Notification
      #   if: always()
      #   uses: slackapi/slack-github-action@v1
