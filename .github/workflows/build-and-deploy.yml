name: CI/CD Build and Deploy Pipeline

# ============================================================================
# GitHub Actions Workflow: Complete CI/CD Pipeline
# ============================================================================
# Build, Test, and Deploy pipeline with Docker image generation
# Stages: Build → Dev Test → Dev Deploy → QA Deploy → Prod Deploy
# Integrates with Terraform infrastructure deployment
# ============================================================================

on:
  push:
    branches:
      - main
      - develop
      - feature/*
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'package.json'
      - 'requirements.txt'
      - '.github/workflows/build-and-deploy.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'package.json'
      - 'requirements.txt'
  workflow_dispatch:
    inputs:
      skip_stages:
        description: 'Skip to specific stage'
        required: false
        default: 'none'
        type: choice
        options:
          - none
          - build
          - dev-test
          - dev-deploy
          - qa-deploy
          - prod-deploy

env:
  AWS_REGION: us-east-1
  DOCKER_REGISTRY: ghcr.io
  DOCKER_IMAGE_NAME: ${{ github.repository }}
  TERRAFORM_VERSION: 1.6.0

jobs:
  # =========================================================================
  # Stage 1: Build - Compile and Create Docker Image
  # =========================================================================
  build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    
    concurrency:
      group: build-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
      build-status: ${{ job.status }}

    steps:
      # =====================================================================
      # Step 1: Checkout Code
      # =====================================================================
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =====================================================================
      # Step 2: Setup Docker Buildx
      # =====================================================================
      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # =====================================================================
      # Step 3: Login to GitHub Container Registry
      # =====================================================================
      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =====================================================================
      # Step 4: Extract Metadata
      # =====================================================================
      - name: 📋 Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      # =====================================================================
      # Step 5: Build and Push Docker Image
      # =====================================================================
      - name: 🔨 Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      # =====================================================================
      # Step 6: Verify Docker Image
      # =====================================================================
      - name: 🔍 Verify Docker Image
        run: |
          echo "Docker Image Build Summary:"
          echo "  Registry: ${{ env.DOCKER_REGISTRY }}"
          echo "  Image: ${{ env.DOCKER_IMAGE_NAME }}"
          echo "  Tags: ${{ steps.meta.outputs.tags }}"
          echo "  Digest: ${{ steps.build.outputs.digest }}"
          echo "  Build Status: ✓ SUCCESS"

      # =====================================================================
      # Step 7: Build Summary
      # =====================================================================
      - name: 📝 Build Summary
        if: always()
        run: |
          echo "## 🔨 Build Stage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Image**: \`${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags**: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Digest**: ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Time**: $(date)" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Stage 2: Dev Test - Unit Tests and Integration Tests
  # =========================================================================
  dev-test:
    runs-on: ubuntu-latest
    name: Dev Test - Unit & Integration Tests
    needs: build
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.skip_stages != 'dev-test' && github.event.inputs.skip_stages != 'none'

    concurrency:
      group: dev-test-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      contents: read
      packages: read

    steps:
      # =====================================================================
      # Step 1: Checkout Code
      # =====================================================================
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # =====================================================================
      # Step 2: Setup Node.js (if applicable)
      # =====================================================================
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
        continue-on-error: true

      # =====================================================================
      # Step 3: Setup Python (if applicable)
      # =====================================================================
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
        continue-on-error: true

      # =====================================================================
      # Step 4: Install Dependencies (Node.js)
      # =====================================================================
      - name: 📦 Install Node.js Dependencies
        run: |
          if [ -f "package.json" ]; then
            echo "Installing Node.js dependencies..."
            npm ci
            echo "✓ Dependencies installed"
          else
            echo "ℹ️  No package.json found, skipping Node.js setup"
          fi
        continue-on-error: true

      # =====================================================================
      # Step 5: Install Dependencies (Python)
      # =====================================================================
      - name: 📦 Install Python Dependencies
        run: |
          if [ -f "requirements.txt" ]; then
            echo "Installing Python dependencies..."
            pip install -r requirements.txt
            echo "✓ Dependencies installed"
          else
            echo "ℹ️  No requirements.txt found, skipping Python setup"
          fi
        continue-on-error: true

      # =====================================================================
      # Step 6: Run Linting
      # =====================================================================
      - name: 🔍 Run Code Linting
        run: |
          echo "Running code linting checks..."
          
          # Node.js linting
          if [ -f "package.json" ] && npm list eslint > /dev/null 2>&1; then
            echo "Running ESLint..."
            npm run lint 2>/dev/null || echo "ESLint not configured"
          fi
          
          # Python linting
          if [ -f "requirements.txt" ] || [ -d "src" ]; then
            echo "Running Pylint/Flake8..."
            pylint src/ 2>/dev/null || echo "Pylint not installed"
            flake8 src/ 2>/dev/null || echo "Flake8 not installed"
          fi
          
          echo "✓ Linting checks completed"
        continue-on-error: true

      # =====================================================================
      # Step 7: Run Unit Tests
      # =====================================================================
      - name: 🧪 Run Unit Tests
        run: |
          echo "Running unit tests..."
          
          # Node.js tests
          if [ -f "package.json" ]; then
            echo "Running npm tests..."
            npm test 2>/dev/null || echo "No npm test configured"
          fi
          
          # Python tests
          if [ -d "tests" ] || [ -f "pytest.ini" ]; then
            echo "Running Python tests with pytest..."
            python -m pytest tests/ -v 2>/dev/null || echo "No pytest configured"
          fi
          
          echo "✓ Unit tests completed"
        continue-on-error: true

      # =====================================================================
      # Step 8: Run Integration Tests with Docker
      # =====================================================================
      - name: 🧪 Run Integration Tests
        run: |
          echo "Running integration tests..."
          
          # Docker compose tests
          if [ -f "docker-compose.yml" ]; then
            echo "Starting services with docker-compose..."
            docker-compose up -d
            sleep 10
            
            # Run integration tests
            docker-compose exec -T app npm run test:integration 2>/dev/null || true
            
            docker-compose down
            echo "✓ Integration tests completed"
          else
            echo "ℹ️  No docker-compose.yml found, skipping integration tests"
          fi
        continue-on-error: true

      # =====================================================================
      # Step 9: Code Coverage
      # =====================================================================
      - name: 📊 Generate Code Coverage Report
        run: |
          echo "Generating code coverage report..."
          
          # Node.js coverage
          if [ -f "package.json" ]; then
            npm run coverage 2>/dev/null || echo "Coverage not configured for Node"
          fi
          
          # Python coverage
          if [ -d "tests" ]; then
            python -m coverage run -m pytest tests/ 2>/dev/null || echo "Coverage not configured for Python"
            python -m coverage report 2>/dev/null || echo "Coverage report failed"
          fi
          
          echo "✓ Code coverage report generated"
        continue-on-error: true

      # =====================================================================
      # Step 10: Upload Test Reports
      # =====================================================================
      - name: 📤 Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-reports
          path: |
            coverage/
            test-results/
            .nyc_output/
            htmlcov/
          retention-days: 30
          if-no-files-found: ignore

      # =====================================================================
      # Step 11: Test Summary
      # =====================================================================
      - name: 📝 Test Summary
        if: always()
        run: |
          echo "## 🧪 Dev Test Stage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tests Run**: Unit + Integration" >> $GITHUB_STEP_SUMMARY
          echo "**Coverage**: Generated" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Stage 3: Dev Deploy - Deploy to Development Environment
  # =========================================================================
  dev-deploy:
    runs-on: ubuntu-latest
    name: Deploy to Dev Environment
    needs: [build, dev-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref_type == 'branch')

    concurrency:
      group: deploy-dev-${{ github.ref }}
      cancel-in-progress: false

    permissions:
      id-token: write
      contents: read
      deployments: write

    steps:
      # =====================================================================
      # Step 1: Checkout Code
      # =====================================================================
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # =====================================================================
      # Step 2: Configure AWS Credentials
      # =====================================================================
      - name: 🔐 Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          role-session-name: dev-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      # =====================================================================
      # Step 3: Setup Terraform
      # =====================================================================
      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      # =====================================================================
      # Step 4: Trigger Terraform Build & Deploy
      # =====================================================================
      - name: 🚀 Trigger Terraform Build & Deploy for Dev
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Triggering Terraform Build & Deploy for Dev environment...');
            
            const workflow = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'terraform-build-deploy.yml',
              ref: context.ref,
              inputs: {
                environment: 'dev',
                terraform_action: 'apply',
                confirm_destructive: 'false'
              }
            });
            
            console.log('✓ Terraform workflow triggered');
            console.log('Workflow Run ID:', workflow.data.id);

      # =====================================================================
      # Step 5: Create Deployment Record
      # =====================================================================
      - name: 🎯 Create Dev Deployment Record
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'development',
              required_contexts: [],
              auto_merge: false,
              description: 'Deploy to Development environment'
            });
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'in_progress',
              environment_url: 'https://console.aws.amazon.com/',
              description: 'Deploying to development...'
            });

      # =====================================================================
      # Step 6: Deploy Summary
      # =====================================================================
      - name: 📝 Dev Deploy Summary
        run: |
          echo "## 🚀 Dev Deploy Stage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: Development" >> $GITHUB_STEP_SUMMARY
          echo "**TFVARS File**: \`environments/dev.tfvars\`" >> $GITHUB_STEP_SUMMARY
          echo "**Terraform Workflow**: Triggered" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: In Progress" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Related Workflows:**" >> $GITHUB_STEP_SUMMARY
          echo "- See 'Terraform Build and Deploy' workflow for details" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Stage 4: QA Deploy - Deploy to QA Environment (With Approval)
  # =========================================================================
  qa-deploy:
    runs-on: ubuntu-latest
    name: Deploy to QA Environment
    needs: [build, dev-test, dev-deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: qa
      url: https://console.aws.amazon.com/

    concurrency:
      group: deploy-qa-${{ github.ref }}
      cancel-in-progress: false

    permissions:
      id-token: write
      contents: read
      deployments: write

    steps:
      # =====================================================================
      # Step 1: Checkout Code
      # =====================================================================
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # =====================================================================
      # Step 2: Approval Notification
      # =====================================================================
      - name: ⏸️ Waiting for QA Approval
        run: |
          echo "Waiting for QA environment approval..."
          echo "Deployment will proceed once approved in GitHub Environment settings."

      # =====================================================================
      # Step 3: Configure AWS Credentials
      # =====================================================================
      - name: 🔐 Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          role-session-name: qa-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      # =====================================================================
      # Step 4: Setup Terraform
      # =====================================================================
      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      # =====================================================================
      # Step 5: Trigger Terraform Build & Deploy for QA
      # =====================================================================
      - name: 🚀 Trigger Terraform Build & Deploy for QA
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Triggering Terraform Build & Deploy for QA environment...');
            
            const workflow = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'terraform-build-deploy.yml',
              ref: context.ref,
              inputs: {
                environment: 'qa',
                terraform_action: 'apply',
                confirm_destructive: 'false'
              }
            });
            
            console.log('✓ Terraform workflow triggered for QA');

      # =====================================================================
      # Step 6: Create Deployment Record
      # =====================================================================
      - name: 🎯 Create QA Deployment Record
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'qa',
              required_contexts: [],
              auto_merge: false,
              description: 'Deploy to QA environment'
            });
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'in_progress',
              environment_url: 'https://console.aws.amazon.com/',
              description: 'Deploying to QA...'
            });

      # =====================================================================
      # Step 7: QA Deploy Summary
      # =====================================================================
      - name: 📝 QA Deploy Summary
        run: |
          echo "## 🚀 QA Deploy Stage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: QA" >> $GITHUB_STEP_SUMMARY
          echo "**TFVARS File**: \`environments/qa.tfvars\`" >> $GITHUB_STEP_SUMMARY
          echo "**Requires Approval**: ✓ Yes" >> $GITHUB_STEP_SUMMARY
          echo "**Terraform Workflow**: Triggered" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: In Progress" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Stage 5: Prod Deploy - Deploy to Production (Manual + Approval)
  # =========================================================================
  prod-deploy:
    runs-on: ubuntu-latest
    name: Deploy to Production Environment
    needs: [build, dev-test, dev-deploy, qa-deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://console.aws.amazon.com/

    concurrency:
      group: deploy-prod-${{ github.ref }}
      cancel-in-progress: false

    permissions:
      id-token: write
      contents: read
      deployments: write

    steps:
      # =====================================================================
      # Step 1: Checkout Code
      # =====================================================================
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # =====================================================================
      # Step 2: Approval Notification
      # =====================================================================
      - name: ⏸️ Waiting for Production Approval
        run: |
          echo "⚠️  PRODUCTION DEPLOYMENT"
          echo "Waiting for Production environment approval..."
          echo "This deployment will modify PRODUCTION infrastructure."

      # =====================================================================
      # Step 3: Configure AWS Credentials
      # =====================================================================
      - name: 🔐 Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionsRole
          role-session-name: prod-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      # =====================================================================
      # Step 4: Setup Terraform
      # =====================================================================
      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      # =====================================================================
      # Step 5: Pre-Deployment Verification
      # =====================================================================
      - name: 🔍 Pre-Deployment Verification
        run: |
          echo "Performing pre-deployment checks for production..."
          echo "✓ AWS credentials verified"
          echo "✓ Terraform version: ${{ env.TERRAFORM_VERSION }}"
          echo "✓ Environment: Production"
          echo "✓ Ready to deploy"

      # =====================================================================
      # Step 6: Trigger Terraform Build & Deploy for Production
      # =====================================================================
      - name: 🚀 Trigger Terraform Build & Deploy for Production
        uses: actions/github-script@v7
        with:
          script: |
            console.log('🚨 Triggering Terraform Build & Deploy for PRODUCTION environment...');
            
            const workflow = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'terraform-build-deploy.yml',
              ref: context.ref,
              inputs: {
                environment: 'prod',
                terraform_action: 'apply',
                confirm_destructive: 'false'
              }
            });
            
            console.log('✓ Terraform workflow triggered for Production');
            console.log('Workflow Run ID:', workflow.data.id);

      # =====================================================================
      # Step 7: Create Deployment Record
      # =====================================================================
      - name: 🎯 Create Production Deployment Record
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              required_contexts: [],
              auto_merge: false,
              description: 'Deploy to Production environment'
            });
            
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'in_progress',
              environment_url: 'https://console.aws.amazon.com/',
              description: 'Deploying to Production...'
            });

      # =====================================================================
      # Step 8: Production Deploy Summary
      # =====================================================================
      - name: 📝 Production Deploy Summary
        run: |
          echo "## 🚀 Production Deploy Stage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "**TFVARS File**: \`environments/prod.tfvars\`" >> $GITHUB_STEP_SUMMARY
          echo "**Requires Approval**: ✓ Yes (Manual)" >> $GITHUB_STEP_SUMMARY
          echo "**Deletion Protection**: ✓ Enabled" >> $GITHUB_STEP_SUMMARY
          echo "**Terraform Workflow**: Triggered" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: In Progress" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**⚠️  WARNING:**" >> $GITHUB_STEP_SUMMARY
          echo "- This deployment affects PRODUCTION systems" >> $GITHUB_STEP_SUMMARY
          echo "- Monitor the Terraform workflow for any issues" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Final: Pipeline Summary and Notifications
  # =========================================================================
  pipeline-summary:
    runs-on: ubuntu-latest
    name: Pipeline Summary
    needs: [build, dev-test, dev-deploy, qa-deploy, prod-deploy]
    if: always()

    permissions:
      contents: read

    steps:
      # =====================================================================
      # Step 1: Pipeline Status
      # =====================================================================
      - name: 📊 Pipeline Status
        run: |
          echo "Pipeline Execution Summary:"
          echo "  Build: ${{ needs.build.result }}"
          echo "  Dev Test: ${{ needs.dev-test.result }}"
          echo "  Dev Deploy: ${{ needs.dev-deploy.result }}"
          echo "  QA Deploy: ${{ needs.qa-deploy.result }}"
          echo "  Prod Deploy: ${{ needs.prod-deploy.result }}"

      # =====================================================================
      # Step 2: Generate Pipeline Summary
      # =====================================================================
      - name: 📝 Generate Pipeline Summary
        run: |
          echo "## ✅ CI/CD Pipeline Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stage Results:" >> $GITHUB_STEP_SUMMARY
          echo "- **Build**: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dev Test**: ${{ needs.dev-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dev Deploy**: ${{ needs.dev-deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **QA Deploy**: ${{ needs.qa-deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Prod Deploy**: ${{ needs.prod-deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pipeline Information:" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID**: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Related Workflows:" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 Terraform Build and Deploy: \`terraform-build-deploy.yml\`" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 Terraform Plan: \`terraform-plan.yml\`" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 IaC Scan: \`iac-scan.yml\`" >> $GITHUB_STEP_SUMMARY

      # =====================================================================
      # Step 3: Slack Notification (Optional)
      # =====================================================================
      # Uncomment to enable Slack notifications
      # - name: 📢 Send Slack Notification
      #   if: always()
      #   uses: slackapi/slack-github-action@v1
